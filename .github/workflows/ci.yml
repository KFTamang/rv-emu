name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

  # ── RISC-V test suite ─────────────────────────────────────────────────────
  riscv-tests:
    name: RISC-V test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install RISC-V toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf make

      - name: Build emulator
        run: cargo build --release

      - name: Run rv64ui-p and rv64mi-p
        run: |
          cargo run -p xtask -- test-riscv \
            --build \
            --suite rv64ui-p \
            --suite rv64mi-p \
            --emulator target/release/rv-emu \
            -- --base-addr 2147483648 --count 100000 --test-result-addr 2147487744

      # rv64si-p contains one known-failing test (rv64si-p-dirty: dirty-bit
      # tracking not yet implemented). Run it separately and allow failure so
      # it appears in the job summary without blocking CI.
      - name: Run rv64si-p (known partial failure: dirty)
        continue-on-error: true
        run: |
          cargo run -p xtask -- test-riscv \
            --suite rv64si-p \
            --emulator target/release/rv-emu \
            -- --base-addr 2147483648 --count 100000 --test-result-addr 2147487744

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xtask-logs
          path: target/xtask-logs/
          retention-days: 7
